name: ci

on: pull_request

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://apeiros.jfrog.io
        with:
          oidc-provider-name: apeiros-dev-jwmclawhorn
          oidc-audience: apeiros-dev-audience
          disable-auto-build-publish: true
          custom-server-id: default

      - name: Configure npm to use JFrog Artifactory
        run: jf npmc --server-id-resolve=default --repo-resolve=npm-virtual

      - name: Delete previous artifact for this PR
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO_NAME="${{ github.event.repository.name }}"

          SEARCH_RESULT=$(jf rt search \
            --props "vcs.pr.number=${PR_NUMBER};vcs.repo=${REPO_NAME}" \
            "gen-virtual/${REPO_NAME}/*.zip")

          ARTIFACT_PATH=$(echo "$SEARCH_RESULT" | jq -r '.[0].path // empty')

          if [[ -n "$ARTIFACT_PATH" ]]; then
            echo "Deleting previous artifact: ${ARTIFACT_PATH}"
            jf rt delete "$ARTIFACT_PATH" --quiet
          else
            echo "No previous artifact found for PR #${PR_NUMBER}. Nothing to clean up."
          fi

      - name: Install dependencies
        run: jf npm install

      - name: Determine artifact name
        id: set-artifact-name
        run: |
          SHORT_SHA=$(git rev-parse --short ${{ github.head_ref }})
          ARTIFACT_NAME="${{ github.event.repository.name }}-${SHORT_SHA}.zip"
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          zip -r "${{ steps.set-artifact-name.outputs.artifact-name }}" \
            src/ \
            host.json \
            package.json \
            package-lock.json

      - name: Upload artifact to Artifactory
        run: |
          jf rt upload \
            "${{ steps.set-artifact-name.outputs.artifact-name }}" \
            "gen-virtual/${{ github.event.repository.name }}/" \
            --target-props "\
            vcs.pr.number=${{ github.event.pull_request.number }};\
            vcs.head.sha=${{ github.event.pull_request.head.sha }};\
            vcs.branch=${{ github.head_ref }};\
            vcs.repo=${{ github.event.repository.name }}" \
            --build-name="${{ github.event.repository.name }}" \
            --build-number="${{ github.event.pull_request.head.sha }}"
