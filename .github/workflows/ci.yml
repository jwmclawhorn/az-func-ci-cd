name: ci

on: pull_request

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        env:
          JF_URL: https://apeiros.jfrog.io
        with:
          oidc-provider-name: apeiros-dev-jwmclawhorn
          oidc-audience: apeiros-dev-audience
          disable-auto-build-publish: true
          custom-server-id: default

      - name: Configure npm to use JFrog Artifactory
        run: jf npmc --server-id-resolve=default --repo-resolve=npm-virtual

      - name: Delete previous artifact for this PR
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO_NAME="${{ github.event.repository.name }}"

          SEARCH_RESULT=$(jf rt search \
            --props "vcs.pr.number=${PR_NUMBER};vcs.repo=${REPO_NAME}" \
            "gen-virtual/${REPO_NAME}/*.zip")

          ARTIFACT_PATH=$(echo "$SEARCH_RESULT" | jq -r '.[0].path // empty')

          if [[ -n "$ARTIFACT_PATH" ]]; then
            echo "Deleting previous artifact: ${ARTIFACT_PATH}"
            jf rt delete "$ARTIFACT_PATH" --quiet
          else
            echo "No previous artifact found for PR #${PR_NUMBER}. Nothing to clean up."
          fi

      - name: Install dependencies
        run: jf npm install

      - name: Determine artifact name
        id: set-artifact-name
        run: |
          ARTIFACT_NAME="${{ github.event.repository.name }}-$(git rev-parse --short HEAD).zip"
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          zip -r "${{ steps.set-artifact-name.outputs.artifact-name }}" \
            src/ \
            host.json \
            package.json

      - name: Upload artifact to Artifactory
        env:
          ARTIFACT_NAME: ${{ steps.set-artifact-name.outputs.artifact-name }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          jf rt upload "${ARTIFACT_NAME}" "gen-virtual/${REPO_NAME}/" \
            --target-props "\
          vcs.pr.number=${PR_NUMBER};\
          vcs.head.sha=${COMMIT_SHA};\
          vcs.branch=${BRANCH_NAME};\
          vcs.repo=${REPO_NAME}" \
            --build-name="${REPO_NAME}" \
            --build-number="${GITHUB_RUN_ID}"
