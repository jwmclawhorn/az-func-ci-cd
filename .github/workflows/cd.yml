# ============================================================
# Reusable CD — Azure Function App (Production)
#
# Triggered by calling workflows on push to main (merge).
# Responsibilities:
#   1. Authenticate to Artifactory via OIDC
#   2. Download the artifact built during CI for this commit
#   3. Authenticate to Azure via OIDC (federated identity)
#   4. Deploy zip to Azure Function App
#
# Deployment targets the `prd` GitHub Environment. Configure
# required reviewers on that environment in repo settings to
# gate production deployments behind a manual approval step.
#
# Required repository variables (set on the CALLING repo):
#   ARTIFACTORY_URL            e.g. https://your-org.jfrog.io
#   ARTIFACTORY_REPO           e.g. generic-local
#   JFROG_OIDC_PROVIDER        OIDC provider name configured in JFrog
#   JFROG_OIDC_AUDIENCE        Audience value configured in JFrog
#   AZURE_CLIENT_ID            App registration client ID
#   AZURE_TENANT_ID            Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID      Target subscription ID
#   AZURE_FUNCTION_APP_NAME    Name of the Function App resource
#
# Permissions granted by this workflow:
#   id-token: write   — OIDC token minting (JFrog + Azure)
#   contents: read
# ============================================================

name: CD — Function App (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: write
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve PR
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_RETRIES=5
          DELAY=5
          ATTEMPT=0

          while [[ $ATTEMPT -lt $MAX_RETRIES ]]; do
            PR_DATA=$(gh api \
              "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0] | {number: .number, labels: [.labels[].name]}' 2>/dev/null || echo "null")

            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number // empty' 2>/dev/null)

            if [[ -n "$PR_NUMBER" ]]; then
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES} — PR not yet associated with commit ${{ github.sha }}. Retrying in ${DELAY}s..."
            sleep $DELAY
          done

          if [[ -z "$PR_NUMBER" ]]; then
            echo "::error::Could not resolve a PR for commit ${{ github.sha }} after ${MAX_RETRIES} attempts. Ensure the push was the result of a merged PR."
            exit 1
          fi

          LABELS=$(echo "$PR_DATA" | jq -r '.labels | join(",")')

          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr-labels=${LABELS}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${PR_NUMBER} with labels: ${LABELS}"

      - name: Compute next version
        id: version
        run: |
          LABELS="${{ steps.resolve-pr.outputs.pr-labels }}"

          if echo "$LABELS" | grep -q "bump:major"; then
            BUMP="major"
          elif echo "$LABELS" | grep -q "bump:minor"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [[ -z "$LATEST" ]]; then
            LATEST="v0.0.0"
          fi

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [[ "$BUMP" == "major" ]]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [[ "$BUMP" == "minor" ]]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Computed next version: ${NEXT} (${BUMP} bump from ${LATEST})"

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        env:
          JF_URL: https://apeiros.jfrog.io
        with:
          oidc-provider-name: apeiros-dev-jwmclawhorn
          oidc-audience: apeiros-dev-audience
          disable-auto-build-publish: true
          custom-server-id: default

      - name: Resolve Artifact
        id: resolve-artifact
        run: |
          PR_NUMBER="${{ steps.resolve-pr.outputs.pr-number }}"
          REPO_NAME="${{ github.event.repository.name }}"

          SEARCH_RESULT=$(jf rt search \
            --props "vcs.pr.number=${PR_NUMBER};vcs.repo=${REPO_NAME}" \
            "gen-virtual/${REPO_NAME}/*.zip")

          ARTIFACT_PATH=$(echo "$SEARCH_RESULT" | jq -r '.[0].path // empty')

          if [[ -z "$ARTIFACT_PATH" ]]; then
            echo "::error::No artifact found in Artifactory for PR #${PR_NUMBER} in repo ${REPO_NAME}."
            exit 1
          fi

          ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")
          echo "artifact-path=${ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download artifact from Artifactory
        env:
          ARTIFACT_PATH: ${{ steps.resolve-artifact.outputs.artifact-path }}
        run: |
          jf rt download \
            "${ARTIFACT_PATH}" \
            ./ \
            --flat=true

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        run: |
          az functionapp deploy \
            -n "${{ vars.AZURE_RESOURCE_NAME }}" \
            -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --src-path "${{ steps.resolve-artifact.outputs.artifact-name }}" \
            --type zip \
            --async false

      - name: Logout of Azure
        if: always()
        run: az logout

      - name: Promote artifact with release version
        id: promote-artifact
        env:
          ARTIFACT_PATH: ${{ steps.resolve-artifact.outputs.artifact-path }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ steps.resolve-pr.outputs.pr-number }}
        run: |
          LOCAL_REPO=$(echo "$ARTIFACT_PATH" | cut -d/ -f1)

          NEW_PATH="${LOCAL_REPO}/${REPO_NAME}/${NEXT_VERSION}/${REPO_NAME}-${NEXT_VERSION}.zip"

          jf rt mv \
            "${ARTIFACT_PATH}" \
            "${NEW_PATH}" \
            --flat=true

          jf rt set-props \
            "${NEW_PATH}" \
            "release.version=${NEXT_VERSION}"

          echo "artifact-path=${NEW_PATH}" >> "$GITHUB_OUTPUT"
          echo "artifact-name=$(basename "${NEW_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Tag commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.next }}" "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.next }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.next }}" \
            --title "${{ steps.version.outputs.next }}" \
            --notes "## What's changed

          PR #${{ steps.resolve-pr.outputs.pr-number }}

          **Bump type:** ${{ steps.version.outputs.bump }}
          **Deployed to:** \`${{ vars.AZURE_RESOURCE_NAME }}\`
          **Artifact:** \`${{ steps.promote-artifact.outputs.artifact-name }}\`" \
            --target "${{ github.sha }}"
